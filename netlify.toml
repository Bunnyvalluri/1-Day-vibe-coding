[build]
  command = "npx prisma generate --schema=backend/prisma/schema.prisma && cd backend && npm install && npm run build && cd ../frontend && npm install && npm run build"
    publish = "frontend/.next"
      functions = "netlify/functions"

      [build.environment]
        NODE_VERSION = "20"

        [[plugins]]
          package = "@netlify/plugin-nextjs"

          # Redirect all /api/* calls to the Netlify serverless function
          [[redirects]]
            from = "/api/*"
              to = "/.netlify/functions/api/:splat"
                status = 200
                  force = true

                  [functions]
                    included_files = ["node_modules/.prisma/client/*.node"]
