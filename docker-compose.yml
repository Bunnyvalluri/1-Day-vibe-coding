version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: church-event-db
    restart: always
    environment:
      POSTGRES_USER: church_admin
      POSTGRES_PASSWORD: SecretPassword123
      POSTGRES_DB: church_events
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
